<!doctype html>

            content="Journal page for the Living Copy website, a space for recording writing activities and accountability."

        <meta property="og:url" content="https://www.livingcopy.uk/pages/journal/" />

        <meta property="og:title" content="Living Copy - Journal" />

            property="og:description"
            content="Journal page for the Living Copy website, a space for recording writing activities and accountability."
        />
        <meta property="og:image" content="https://www.livingcopy.uk/img/living_copy_og_img.png" />
        <title>Living Copy - Journal</title>
        <link rel="canonical" href="https://www.livingcopy.uk/pages/journal/" />
        <link rel="shortcut icon" href="/img/favicon/favicon.ico" type="image/x-icon" />

        <a href="/pages/journal/#main" id="skip-to-main">Skip to main content</a>

                    <h1>
                        <img
                            class="header-logo"
                            src="/img/living_copy_header_logo.png"
                            alt="Living Copy home page logo"
                        />

                </a>
                <nav class="nav-container">
                    <a class="nav-link" href="/pages/blog/">Blog</a>
                    <span class="nav-seperator"> | </span>
                    <a class="nav-link" href="/pages/creative/">Creative</a>
                </nav>
            </header>
            <!-- Mobile header -->
            <header class="mobile-header-container">
                <h1>
                    <a class="mobile-logo-container" href="/">
                        <img class="mobile-header-logo" src="/img/logo.png" alt="Living Copy home page logo" />

                    aria-label="Toggle navigation menu"

                    aria-controls="mobile-nav-container"

                    <span class="burger__bar"></span>

                    <a class="mobile-nav-link" href="/pages/blog/">Blog</a>
                    <a class="mobile-nav-link" href="/pages/creative/">Creative</a>

            <main id="main">
                <div class="intro-container">
                    <p class="intro-text">
                        <span class="intro-name">Journal</span> a space for recording writing activities and personal

                    </p>
                </div>
                <div class="journal-content-container">
                    <span class="divider"></span>
                    <ul class="journal-container"></ul>
                </div>
            </main>
            <footer class="footer-container">
                <p class="footer-text">
                    Andrew Macmillan &copy; 2026 &nbsp;|&nbsp;
                    <a class="footer-link" href="/pages/privacy/">Privacy Policy</a>
